<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amer Rehan Syed</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%23111'/><path d='M16 4 a12 12 0 0 1 10.4 6 l-4.2 1.4 -3.8-3.2V4z' fill='%23fff'/><path d='M26.4 10 a12 12 0 0 1 1.6 6.8 l-4.4-.4 -1.6-4.8z' fill='%23fff'/><path d='M5.6 10 l4.4 1.6 -1.6 4.8 -4.4.4 A12 12 0 0 1 5.6 10z' fill='%23fff'/><path d='M4 17.2 l4.4-.4 2.2 4.2 -2.6 3.6 A12 12 0 0 1 4 17.2z' fill='%23fff'/><path d='M25.8 24.6 l-2.6-3.6 2.2-4.2 4.4.4 A12 12 0 0 1 25.8 24.6z' fill='%23fff'/><path d='M16 28 l-3.4-4.2 1.8-4.8 3.2 0 1.8 4.8z' fill='%23fff'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script>
  // ╔══════════════════════════════════════════════════════════════╗
  // ║   ✏️  PLUG & PLAY CONFIG — Only edit this section!          ║
  // ║   Everything on the page is driven from here.               ║
  // ╚══════════════════════════════════════════════════════════════╝
  const CONFIG = {

    // ── Personal ──────────────────────────────────────────────────
    name:     "Amer Rehan Syed",
    subtitle: "Electrical Engineering · Power Electronics · IoT",
    photo:    "me_cali.jpeg",           // photo filename (same folder as index.html)
    email:    "amerrehan12usa@gmail.com", // ← swap this

    // ── Hero description (HTML allowed, \n = line break) ──────────
    description:
      `Graduate researcher at <strong>UT Dallas</strong> working on DC-DC converters, planar transformers,
and motor drive systems — with a focus on <strong>IoT-enabled power systems</strong>:
real-time telemetry, remote fault detection, and smart energy monitoring
for next-generation infrastructure.`,

    // ── Links (set to "" to hide a button) ───────────────────────
    links: {
      linkedin: "https://www.linkedin.com/in/syed-amer-rehan/",
      resume:   "https://drive.google.com/file/d/19DZ0p4xc4sgkSkxufLqULOvVHgk-R80y/view?usp=sharing",
      github:   "",   // e.g. "https://github.com/yourhandle"  or "" to hide
    },

    // ── Research Focus Cards (add / remove / edit freely) ─────────
    focusCards: [
      { icon: "⚡", title: "Power Converters",    desc: "DC-DC converter design, planar transformer optimization, and switching loss reduction." },
      { icon: "🌐", title: "IoT Integration",     desc: "ESP32 & Raspberry Pi embedded in converter systems for remote telemetry and fault detection." },
      { icon: "🔋", title: "EV & Smart Grid",     desc: "IoT-connected EV charging infrastructure and smart grid edge devices for power quality monitoring." },
      { icon: "🔄", title: "Motor Drive Systems", desc: "Advanced motor control strategies and hardware-software integration for drive applications." },
    ],

    // ── Skill Groups ──────────────────────────────────────────────
    // Plain string = normal tag.  { label: "ESP32", iot: true } = teal IoT tag.
    skillGroups: [
      {
        title: "Simulation & Design",
        tags: ["MATLAB", "Simulink", "LTspice", "PLECS"],
      },
      {
        title: "Hardware & Embedded",
        tags: ["Arduino", { label: "ESP32", iot: true }, { label: "Raspberry Pi", iot: true }, "PCB Design"],
      },
      {
        title: "IoT & Connectivity",
        tags: [
          { label: "MQTT",             iot: true },
          { label: "Node-RED",         iot: true },
          { label: "Cloud Dashboards", iot: true },
          { label: "Wireless Sensors", iot: true },
        ],
      },
      {
        title: "Programming",
        tags: ["Python", "C/C++", "MATLAB Scripting"],
      },
    ],

    // ── Education (add more objects for multiple degrees) ─────────
    education: [
      {
        school: "University of Texas at Dallas",
        degree: "M.S. Electrical Engineering — Power Electronics & Energy Systems",
      },
    ],

    // ── Contact ───────────────────────────────────────────────────
    contactHeading: "Open to research collaborations & opportunities",
    contactSubtext: "Feel free to reach out via email or LinkedIn.",

    // ── Footer ────────────────────────────────────────────────────
    footerText: "© 2025 Amer Rehan Syed · UT Dallas",
  };
  // ╔══════════════════════════════════════════════════════════════╗
  // ║   END OF CONFIG — Don't edit below unless you know HTML/CSS ║
  // ╚══════════════════════════════════════════════════════════════╝
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a2340; --teal: #0d9488; --teal-light: #ccfbf1;
      --sand: #f8f5f0; --white: #ffffff; --text: #2d3748;
      --muted: #6b7280; --border: #e5e7eb;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; }

    /* HERO */
    .hero { background: var(--navy); padding: 60px 24px 80px; text-align: center; position: relative; overflow: hidden; }
    .hero::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 70% 50%, rgba(13,148,136,.18) 0%, transparent 65%),
                  radial-gradient(ellipse at 20% 80%, rgba(13,148,136,.10) 0%, transparent 50%);
    }
    .hero-inner { max-width: 680px; margin: 0 auto; position: relative; }
    .avatar-wrap { display: inline-block; position: relative; margin-bottom: 28px; }
    .avatar-wrap::after { content: ''; position: absolute; inset: -5px; border-radius: 50%; border: 2px solid var(--teal); opacity: .6; }
    .profile-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; display: block; border: 4px solid rgba(255,255,255,.1); }
    .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem,5vw,2.8rem); color: var(--white); letter-spacing: -.5px; margin-bottom: 8px; }
    .hero-title { color: var(--teal); font-size: .95rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
    .hero-desc { color: rgba(255,255,255,.72); font-size: 1rem; line-height: 1.75; max-width: 520px; margin: 0 auto 32px; }
    .hero-desc strong { color: rgba(255,255,255,.95); font-weight: 500; }

    /* BUTTONS */
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn { text-decoration: none; font-weight: 600; font-size: .875rem; padding: .65em 1.5em; border-radius: 6px; display: inline-flex; align-items: center; gap: 7px; transition: transform .15s, box-shadow .15s, opacity .15s; letter-spacing: .2px; }
    .btn:hover { transform: translateY(-2px); opacity: .92; box-shadow: 0 6px 20px rgba(0,0,0,.18); }
    .btn-linkedin { background: #0077b5; color: #fff; }
    .btn-resume   { background: var(--teal); color: #fff; }
    .btn-github   { background: #24292e; color: #fff; }
    .btn-email    { background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.25); backdrop-filter: blur(4px); }

    /* MAIN */
    .main { max-width: 720px; margin: 0 auto; padding: 48px 24px 64px; }
    .section { margin-bottom: 48px; }
    .section-label { font-size: .72rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--teal); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* FOCUS CARDS */
    .focus-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; }
    .focus-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 18px; transition: box-shadow .2s, transform .2s; }
    .focus-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-2px); }
    .focus-card .icon { font-size: 1.6rem; margin-bottom: 10px; display: block; }
    .focus-card h3 { font-size: .9rem; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .focus-card p { font-size: .8rem; color: var(--muted); line-height: 1.55; }

    /* SKILLS */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 16px; }
    .skill-group { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .skill-group h4 { font-size: .8rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--navy); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag { background: var(--sand); color: var(--text); font-size: .78rem; font-weight: 500; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
    .tag.iot { background: var(--teal-light); color: #0f766e; border-color: #99f6e4; }

    /* EDUCATION */
    .edu-list { display: flex; flex-direction: column; gap: 12px; }
    .edu-card { background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--teal); border-radius: 12px; padding: 22px 22px 22px 24px; }
    .edu-card .school { font-weight: 600; color: var(--navy); font-size: 1rem; margin-bottom: 4px; }
    .edu-card .degree { color: var(--muted); font-size: .875rem; }

    /* CONTACT */
    .contact-bar { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
    .contact-bar p { color: var(--muted); font-size: .9rem; }
    .contact-bar strong { display: block; color: var(--navy); font-size: 1rem; margin-bottom: 2px; }
    .email-link { color: var(--teal); text-decoration: none; font-weight: 600; font-size: .9rem; background: var(--teal-light); padding: 8px 18px; border-radius: 6px; transition: background .15s; }
    .email-link:hover { background: #99f6e4; }

    footer { text-align: center; padding: 24px; color: var(--muted); font-size: .8rem; border-top: 1px solid var(--border); }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .hero-inner > * { animation: fadeUp .55s ease both; }
    .hero-inner > *:nth-child(1) { animation-delay: .05s; }
    .hero-inner > *:nth-child(2) { animation-delay: .15s; }
    .hero-inner > *:nth-child(3) { animation-delay: .22s; }
    .hero-inner > *:nth-child(4) { animation-delay: .28s; }
    .hero-inner > *:nth-child(5) { animation-delay: .34s; }
  </style>
</head>
<body>

<header class="hero"><div class="hero-inner" id="hero-inner"></div></header>
<main class="main" id="main-content"></main>
<footer id="footer"></footer>

<script>
const icons = {
  linkedin: `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
  resume:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  github:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23A11.52 11.52 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.29-1.552 3.297-1.23 3.297-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>`,
  email:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
};

// Build hero
document.getElementById('hero-inner').innerHTML = `
  <div class="avatar-wrap">
    <img src="${CONFIG.photo}" alt="${CONFIG.name}" class="profile-img">
  </div>
  <h1>${CONFIG.name}</h1>
  <p class="hero-title">${CONFIG.subtitle}</p>
  <p class="hero-desc">${CONFIG.description.replace(/\n/g,'<br>')}</p>
  <div class="btns">
    ${CONFIG.links.linkedin ? `<a class="btn btn-linkedin" href="${CONFIG.links.linkedin}" target="_blank">${icons.linkedin} LinkedIn</a>` : ''}
    ${CONFIG.links.resume   ? `<a class="btn btn-resume"   href="${CONFIG.links.resume}"   target="_blank">${icons.resume} Resume</a>` : ''}
    ${CONFIG.links.github   ? `<a class="btn btn-github"   href="${CONFIG.links.github}"   target="_blank">${icons.github} GitHub</a>` : ''}
    ${CONFIG.email          ? `<a class="btn btn-email"    href="mailto:${CONFIG.email}">${icons.email} Email</a>` : ''}
  </div>`;

// Build focus cards
const focusHTML = CONFIG.focusCards.map(c =>
  `<div class="focus-card"><span class="icon">${c.icon}</span><h3>${c.title}</h3><p>${c.desc}</p></div>`
).join('');

// Build skill groups
const skillsHTML = CONFIG.skillGroups.map(g => {
  const tagsHTML = g.tags.map(t => {
    const label = typeof t === 'string' ? t : t.label;
    const iot   = typeof t === 'object' && t.iot;
    return `<span class="tag${iot?' iot':''}">${label}</span>`;
  }).join('');
  return `<div class="skill-group"><h4>${g.title}</h4><div class="tags">${tagsHTML}</div></div>`;
}).join('');

// Build education
const eduHTML = CONFIG.education.map(e =>
  `<div class="edu-card"><div class="school">${e.school}</div><div class="degree">${e.degree}</div></div>`
).join('');

// Inject main
document.getElementById('main-content').innerHTML = `
  <section class="section">
    <div class="section-label">Research Focus</div>
    <div class="focus-grid">${focusHTML}</div>
  </section>
  <section class="section">
    <div class="section-label">Skills &amp; Tools</div>
    <div class="skills-grid">${skillsHTML}</div>
  </section>
  <section class="section">
    <div class="section-label">Education</div>
    <div class="edu-list">${eduHTML}</div>
  </section>
  <section class="section">
    <div class="section-label">Get in Touch</div>
    <div class="contact-bar">
      <div>
        <strong>${CONFIG.contactHeading}</strong>
        <p>${CONFIG.contactSubtext}</p>
      </div>
      <a class="email-link" href="mailto:${CONFIG.email}">${CONFIG.email}</a>
    </div>
  </section>`;

document.getElementById('footer').textContent = CONFIG.footerText;
</script>
</body>
</html>
